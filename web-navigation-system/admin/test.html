<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台管理测试页面</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div style="padding: 20px;">
        <h1>后台管理测试页面</h1>
        <p>这个页面用于测试后台管理功能是否正常工作</p>
        
        <h2>测试项目</h2>
        <ul>
            <li><button onclick="testCSS()">测试CSS加载</button></li>
            <li><button onclick="testJS()">测试JavaScript加载</button></li>
            <li><button onclick="testAPI()">测试API连接</button></li>
        </ul>
        
        <div id="test-results"></div>
    </div>
    
    <script src="admin.js"></script>
    <script>
        function testCSS() {
            const results = document.getElementById('test-results');
            const bodyStyle = window.getComputedStyle(document.body);
            results.innerHTML = `<div>CSS测试: 背景颜色为 ${bodyStyle.backgroundColor}</div>`;
        }
        
        function testJS() {
            const results = document.getElementById('test-results');
            results.innerHTML = `<div>JavaScript测试: API_BASE_URL = ${typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '未定义'}</div>`;
        }
        
        async function testAPI() {
            const results = document.getElementById('test-results');
            try {
                const response = await fetch('http://82.156.52.192:5000/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: 'test' })
                });
                const data = await response.json();
                results.innerHTML = `<div>API测试: 响应状态 ${response.status}, 数据 ${JSON.stringify(data)}</div>`;
            } catch (error) {
                results.innerHTML = `<div>API测试: 错误 ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
