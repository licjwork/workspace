<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狗蛋导航系统 - 后台管理</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-container" class="login-container" style="display: flex;">
        <div class="login-box">
            <div class="login-header">
                <h1>🐕 狗蛋导航系统</h1>
                <p>后台管理登录</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-username">用户名:</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码:</label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="form-actions">
                    <button type="submit">登录</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 主管理界面 -->
    <div id="admin-container" class="admin-container" style="display: none;">
        <header class="admin-header">
            <div class="header-left">
                <h1>🐕 狗蛋导航系统 - 后台管理</h1>
                <span class="current-user">当前用户: <span id="current-user">管理员</span></span>
            </div>
            <div class="admin-nav">
                <button class="nav-btn active" data-tab="users">用户管理</button>
                <button class="nav-btn" data-tab="sites">网站管理</button>
                <button class="nav-btn" data-tab="stats">统计信息</button>
                <button class="nav-btn" data-tab="logout">退出管理</button>
            </div>
        </header>

        <main class="admin-main">
            <!-- 用户管理标签页 -->
            <div id="users-tab" class="tab-content active">
                <div class="tab-header">
                    <h2>用户管理</h2>
                    <div class="tab-actions">
                        <button onclick="refreshUsers()">刷新</button>
                    </div>
                </div>
                
                <div class="users-stats">
                    <div class="stat-card">
                        <span class="stat-number" id="total-users">0</span>
                        <span class="stat-label">总用户数</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="today-users">0</span>
                        <span class="stat-label">今日新增</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="active-users">0</span>
                        <span class="stat-label">活跃用户</span>
                    </div>
                </div>

                <div class="users-table-container">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                                <th>收藏数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- 用户数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 网站管理标签页 -->
            <div id="sites-tab" class="tab-content">
                <div class="tab-header">
                    <h2>网站管理</h2>
                    <div class="tab-actions">
                        <button onclick="showAddSiteForm()">添加网站</button>
                        <button onclick="refreshSites()">刷新</button>
                        <select id="category-filter" onchange="filterSites()">
                            <option value="all">全部分类</option>
                            <option value="ai">AI</option>
                            <option value="work">工作</option>
                            <option value="study">学习</option>
                            <option value="entertainment">娱乐</option>
                            <option value="tools">工具</option>
                        </select>
                    </div>
                </div>

                <div class="sites-stats">
                    <div class="stat-card">
                        <span class="stat-number" id="total-sites">0</span>
                        <span class="stat-label">总网站数</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="ai-sites">0</span>
                        <span class="stat-label">AI类</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="work-sites">0</span>
                        <span class="stat-label">工作类</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="study-sites">0</span>
                        <span class="stat-label">学习类</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="entertainment-sites">0</span>
                        <span class="stat-label">娱乐类</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="tools-sites">0</span>
                        <span class="stat-label">工具类</span>
                    </div>
                </div>

                <div class="sites-table-container">
                    <table class="sites-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>网站名称</th>
                                <th>URL</th>
                                <th>分类</th>
                                <th>图标</th>
                                <th>描述</th>
                                <th>收藏数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="sites-table-body">
                            <!-- 网站数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 统计信息标签页 -->
            <div id="stats-tab" class="tab-content">
                <div class="tab-header">
                    <h2>统计信息</h2>
                    <div class="tab-actions">
                        <button onclick="refreshStats()">刷新</button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stats-card">
                        <h3>📊 系统概览</h3>
                        <div class="stats-overview">
                            <div class="overview-item">
                                <span class="overview-label">网站总数</span>
                                <span class="overview-value" id="overview-total-sites">0</span>
                            </div>
                            <div class="overview-item">
                                <span class="overview-label">用户总数</span>
                                <span class="overview-value" id="overview-total-users">0</span>
                            </div>
                            <div class="overview-item">
                                <span class="overview-label">总收藏数</span>
                                <span class="overview-value" id="overview-total-favorites">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="stats-card">
                        <h3>🏷️ 分类统计</h3>
                        <div class="category-chart" id="category-chart">
                            <!-- 分类统计图表将通过JavaScript动态生成 -->
                        </div>
                    </div>

                    <div class="stats-card">
                        <h3>📈 活跃度统计</h3>
                        <div class="activity-stats">
                            <div class="activity-item">
                                <span class="activity-label">今日新增用户</span>
                                <span class="activity-value" id="today-new-users">0</span>
                            </div>
                            <div class="activity-item">
                                <span class="activity-label">今日新增收藏</span>
                                <span class="activity-value" id="today-new-favorites">0</span>
                            </div>
                            <div class="activity-item">
                                <span class="activity-label">最近活跃用户</span>
                                <span class="activity-value" id="recent-active-users">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 添加/编辑网站模态框 -->
        <div id="site-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="closeSiteModal()">&times;</span>
                <h2 id="site-modal-title">添加网站</h2>
                <form id="site-form">
                    <div class="form-group">
                        <label for="site-name">网站名称:</label>
                        <input type="text" id="site-name" required>
                    </div>
                    <div class="form-group">
                        <label for="site-url">网站URL:</label>
                        <input type="url" id="site-url" required>
                    </div>
                    <div class="form-group">
                        <label for="site-category">分类:</label>
                        <select id="site-category" required>
                            <option value="ai">AI</option>
                            <option value="work">工作</option>
                            <option value="study">学习</option>
                            <option value="entertainment">娱乐</option>
                            <option value="tools">工具</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="site-icon">图标:</label>
                        <input type="text" id="site-icon" placeholder="例如: 🔍">
                    </div>
                    <div class="form-group">
                        <label for="site-description">描述:</label>
                        <textarea id="site-description" placeholder="网站描述"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit">保存</button>
                        <button type="button" onclick="closeSiteModal()">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 消息提示 -->
        <div id="message-toast" class="toast">
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
