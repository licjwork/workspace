<!DOCTYPE html>
<html>
<head>
    <title>后台管理调试</title>
</head>
<body>
    <h1>后台管理页面调试</h1>
    
    <iframe src="http://82.156.52.192:8017/admin/" width="100%" height="600"></iframe>
    
    <h2>资源检查</h2>
    <div id="resource-check">检查中...</div>
    
    <script>
        async function checkResources() {
            const resources = [
                'http://82.156.52.192:8017/admin/',
                'http://82.156.52.192:8017/admin/admin.css',
                'http://82.156.52.192:8017/admin/admin.js'
            ];
            
            let results = '';
            for (let url of resources) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        results += `<div style="color: green;">✅ ${url} - 正常</div>`;
                    } else {
                        results += `<div style="color: red;">❌ ${url} - HTTP ${response.status}</div>`;
                    }
                } catch (error) {
                    results += `<div style="color: red;">❌ ${url} - ${error.message}</div>`;
                }
            }
            document.getElementById('resource-check').innerHTML = results;
        }
        
        checkResources();
    </script>
</body>
</html>
