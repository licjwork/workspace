<!DOCTYPE html>
<html>
<head>
    <title>测试排行榜脱敏</title>
</head>
<body>
    <h1>测试排行榜脱敏功能</h1>
    
    <div>
        <h3>测试用户名脱敏：</h3>
        <div id="test-results"></div>
    </div>
    
    <script>
        // 测试脱敏函数
        function maskUsername(username) {
            if (!username) {
                return '匿名用户';
            }
            
            // 用户名长度至少为4才进行脱敏处理
            // 这样"abcd"会显示为"a**d"，而"abc"会直接显示"abc"
            if (username.length >= 4) {
                const firstChar = username.charAt(0);
                const lastChar = username.charAt(username.length - 1);
                return `${firstChar}**${lastChar}`;
            }
            
            // 长度小于4的用户名直接显示
            return username;
        }
        
        // 测试用例
        const testCases = [
            { username: 'qin', expected: 'qin' },
            { username: 'ab', expected: 'ab' },
            { username: 'abc', expected: 'abc' },
            { username: 'abcd', expected: 'a**d' },
            { username: 'abcde', expected: 'a**e' },
            { username: 'lilili', expected: 'l**i' },
            { username: 'testuser', expected: 't**r' },
            { username: 'admin', expected: 'a**n' },
            { username: null, expected: '匿名用户' },
            { username: '', expected: '匿名用户' },
            { username: 'a', expected: 'a' }
        ];
        
        let resultsHtml = '<ul>';
        testCases.forEach(test => {
            const result = maskUsername(test.username);
            const passed = result === test.expected;
            resultsHtml += `<li>
                用户名: "${test.username}" → 脱敏后: "${result}"
                <span style="color: ${passed ? 'green' : 'red'}">${passed ? '✓' : '✗'}</span>
            </li>`;
        });
        resultsHtml += '</ul>';
        
        document.getElementById('test-results').innerHTML = resultsHtml;
        
        // 测试API调用
        console.log('测试排行榜API...');
        fetch('http://82.156.52.192:5000/api/wooden-fish/leaderboard')
            .then(response => response.json())
            .then(data => {
                console.log('API返回的数据:', data);
                console.log('脱敏测试结果:');
                data.forEach(item => {
                    console.log(`原始: ${item.username} → 脱敏: ${maskUsername(item.username)}`);
                });
            })
            .catch(error => console.error('API调用失败:', error));
    </script>
</body>
</html>
