<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台管理测试页面</title>
</head>
<body>
    <h1>后台管理测试</h1>
    <p>当前时间: <span id="time"></span></p>
    
    <h2>测试链接</h2>
    <ul>
        <li><a href="http://82.156.52.192:8017/admin/" target="_blank">后台管理页面</a></li>
        <li><a href="http://82.156.52.192:8017/admin/admin.js" target="_blank">JavaScript文件</a></li>
        <li><a href="http://82.156.52.192:8017/admin/admin.css" target="_blank">CSS文件</a></li>
    </ul>
    
    <h2>网络测试</h2>
    <div id="network-test"></div>
    
    <script>
        // 显示当前时间
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        
        // 测试网络连接
        async function testNetwork() {
            const testDiv = document.getElementById('network-test');
            const urls = [
                'http://82.156.52.192:8017/admin/',
                'http://82.156.52.192:8017/admin/admin.js',
                'http://82.156.52.192:8017/admin/admin.css'
            ];
            
            let results = '';
            for (let url of urls) {
                try {
                    const response = await fetch(url);
                    results += `<div>✅ ${url} - 状态: ${response.status}</div>`;
                } catch (error) {
                    results += `<div>❌ ${url} - 错误: ${error.message}</div>`;
                }
            }
            testDiv.innerHTML = results;
        }
        
        testNetwork();
    </script>
</body>
</html>
